<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Contact - Jordan Morrison</title>

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />

    <!-- HEADER FIX -->
    <style>
        header.masthead h1,
        header.masthead .subheading {
            color: white !important;
            text-align: center;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
    <div class="container px-4 px-lg-5">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
            Menu <i class="fas fa-bars"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto py-4 py-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="post.html">Resume</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="masthead" style="background-image: url('assets/img/contact-bg.jpg')">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row justify-content-center text-center">
            <div class="col-md-10 col-lg-8 col-xl-7">

                <h1>Contact Me</h1>
                <span class="subheading">Have questions? I have answers.</span>

            </div>
        </div>
    </div>
</header>

<main class="mb-4">
    <div class="container px-4 px-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">

                <p>Want to get in touch? Send me a message below!</p>

                <div class="my-5">
                    <form id="contactForm">

                        <div class="form-floating">
                            <input class="form-control" id="name" type="text" placeholder="Name">
                            <label for="name">Name</label>
                        </div>

                        <div class="form-floating">
                            <input class="form-control" id="email" type="email" placeholder="Email">
                            <label for="email">Email</label>
                        </div>

                        <div class="form-floating">
                            <input class="form-control" id="phone" type="tel" placeholder="Phone">
                            <label for="phone">Phone</label>
                        </div>

                        <div class="form-floating">
                            <textarea class="form-control" id="message" style="height: 12rem"></textarea>
                            <label for="message">Message</label>
                        </div>

                        <br>

                        <button class="btn btn-primary">Send</button>

                    </form>
                </div>

            </div>
        </div>
    </div>
</main>

<footer class="border-top">
    <div class="container text-center">
        <p class="text-muted">© 2026 Jordan Morrison</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/scripts.js"></script>

</body>
</html>
